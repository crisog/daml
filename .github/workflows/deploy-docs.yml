name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "content/**"
      - "sandbox/**"
      - "migrations/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "source.config.ts"
      - "wrangler.jsonc"
      - ".github/workflows/deploy-docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "content/**"
      - "sandbox/**"
      - "migrations/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "source.config.ts"
      - "wrangler.jsonc"
      - ".github/workflows/deploy-docs.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run build

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Check if sandbox changed
        id: sandbox
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^sandbox/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Use existing container image for worker-only deploy
        if: steps.sandbox.outputs.changed == 'false'
        run: |
          # Get the current image tag from the registry to avoid rebuilding
          CURRENT_IMAGE=$(npx wrangler containers images list 2>/dev/null | grep daml-sandbox | head -1 | awk '{print $2}')
          if [ -n "$CURRENT_IMAGE" ]; then
            # Replace Dockerfile path with registry image reference
            sed -i "s|./sandbox/Dockerfile|$CURRENT_IMAGE|" wrangler.jsonc
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - run: npm run build

      - run: npx wrangler d1 migrations apply daml-playground-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
