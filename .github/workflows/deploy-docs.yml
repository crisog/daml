name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "content/**"
      - "sandbox/**"
      - "migrations/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "source.config.ts"
      - "wrangler.jsonc"
      - ".github/workflows/deploy-docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "content/**"
      - "sandbox/**"
      - "migrations/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "source.config.ts"
      - "wrangler.jsonc"
      - ".github/workflows/deploy-docs.yml"

env:
  SANDBOX_IMAGE: ghcr.io/crisog/daml-playground/sandbox

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run build

  sandbox-image:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check if sandbox changed
        id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^sandbox/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        if: steps.check.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push sandbox image
        if: steps.check.outputs.changed == 'true'
        run: |
          docker build -t $SANDBOX_IMAGE:${{ github.sha }} -t $SANDBOX_IMAGE:latest -f sandbox/Dockerfile sandbox/
          docker push $SANDBOX_IMAGE:${{ github.sha }}
          docker push $SANDBOX_IMAGE:latest

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build, sandbox-image]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run build

      - run: npx wrangler d1 migrations apply daml-playground-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
