name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "content/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "source.config.ts"
      - "wrangler.jsonc"
      - ".github/workflows/deploy-docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "content/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "source.config.ts"
      - "wrangler.jsonc"
      - ".github/workflows/deploy-docs.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run build

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
